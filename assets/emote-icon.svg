<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <radialGradient id="emoteBody" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#b47ee8"/>
      <stop offset="55%" stop-color="#844acb"/>
      <stop offset="100%" stop-color="#4a357a"/>
    </radialGradient>
    <linearGradient id="emoteOutline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7c84f"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </linearGradient>
  </defs>
  <!-- Round sticker body -->
  <circle cx="20" cy="20" r="17" fill="url(#emoteBody)" stroke="url(#emoteOutline)" stroke-width="2"/>
  <!-- Highlight -->
  <ellipse cx="14" cy="13" rx="5" ry="3" fill="rgba(255,255,255,0.25)"/>
  <!-- Eyes -->
