  <!-- Smile -->
  <path d="M13 24 Q20 30 27 24" stroke="#1a1230" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Tiny sparkles -->
  <circle cx="32" cy="11" r="1" fill="#fdfd80"/>
