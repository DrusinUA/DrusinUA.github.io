<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600&amp;family=Comfortaa:wght@700&amp;display=swap');
      
      .badge { fill: #324426; }
      .badge-text { font-family: 'Playfair Display', serif; font-size: 28px; fill: #efece0; letter-spacing: 0.5px; }
      
      .base-group {
        stroke: #efece0;
        stroke-width: 14;
        stroke-linejoin: round;
        stroke-linecap: round;
        paint-order: stroke fill;
      }
      
      /* Custom shapes for the letters */
      .thick-letter {
        fill: none;
        stroke: #2c201a;
        stroke-width: 22;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .coco-outer {
        fill: #2c201a;
      }
      .coco-inner {
        fill: #fcfbfa;
      }
      .coco-shadow {
        fill: #e3dfd3;
      }
    </style>
    
    <!-- Filter to generate the outer white stroke properly for overlapping path segments -->
    <filter id="white-outline" x="-10%" y="-10%" width="120%" height="120%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="8" result="DILATED" />
      <feFlood flood-color="#efece0" flood-opacity="1" result="WHITE" />
      <feComposite in="WHITE" in2="DILATED" operator="in" result="OUTLINE" />
      <feMerge>
        <feMergeNode in="OUTLINE" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(0, 10)">
    
    <g filter="url(#white-outline)">
      <!-- Wavy Green Badge -->
      <path class="badge" d="M 180 50 Q 250 35 320 40 L 320 80 Q 250 70 180 85 Z" />
      <text x="250" y="70" text-anchor="middle" class="badge-text" style="stroke: none;">кафе</text>

      <!-- Draw C 1 -->
      <path class="thick-letter" d="M 140 120 C 130 100, 70 100, 70 150 C 70 200, 130 200, 140 180" />
      <!-- Terminal dots for C1 -->
      <circle cx="140" cy="120" r="11" fill="#2c201a" style="stroke: none;" />
      <circle cx="140" cy="180" r="11" fill="#2c201a" style="stroke: none;" />

      <!-- O 1 (Coconut) -->
      <g transform="translate(200, 150)">
        <circle cx="0" cy="0" r="34" class="coco-outer" style="stroke: none;" />
        <circle cx="0" cy="0" r="22" class="coco-inner" style="stroke: none;" />
        <path d="M -16 -14 A 20 20 0 0 0 -16 14 A 25 25 0 0 1 -16 -14 Z" class="coco-shadow" style="stroke: none;" />
      </g>

      <!-- Draw C 2 -->
      <path class="thick-letter" d="M 330 120 C 320 100, 260 100, 260 150 C 260 200, 320 200, 330 180" />
      <!-- Terminal dots for C2 -->
      <circle cx="330" cy="120" r="11" fill="#2c201a" style="stroke: none;" />
      <circle cx="330" cy="180" r="11" fill="#2c201a" style="stroke: none;" />

      <!-- O 2 (Coconut) -->
      <g transform="translate(390, 150)">
        <circle cx="0" cy="0" r="34" class="coco-outer" style="stroke: none;" />
        <circle cx="0" cy="0" r="22" class="coco-inner" style="stroke: none;" />
        <path d="M -16 -14 A 20 20 0 0 0 -16 14 A 25 25 0 0 1 -16 -14 Z" class="coco-shadow" style="stroke: none;" />
      </g>

      <!-- Draw S -->
      <path class="thick-letter" d="M 490 120 C 470 90, 440 120, 450 145 C 460 170, 440 210, 410 180" />
      <!-- Terminal dots for S -->
      <circle cx="490" cy="120" r="11" fill="#2c201a" style="stroke: none;" />
      <circle cx="410" cy="180" r="11" fill="#2c201a" style="stroke: none;" />
    </g>

  </g>
</svg>