<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <!-- Definitions for shadows and gradients -->
  <defs>
    <!-- Dark brown for text -->
    <style>
      .wordmark {
        font-family: 'Arial', 'Helvetica', sans-serif;
        font-weight: 900;
        font-size: 100px;
        fill: #433124;
      }
      .coconut-inner {
        fill: #fdfbf7;
      }
      .coconut-shadow {
        fill: #e0d0bd;
      }
    </style>
  </defs>

  <!-- We will emulate the text and coconut elements -->
  <!-- Base Text -->
  <!-- Letter C -->
  <path d="M 120 100 C 90 120, 40 110, 40 70 C 40 30, 90 20, 120 40" fill="none" stroke="#433124" stroke-width="25" stroke-linecap="round"/>
  
  <!-- First O (Coconut) -->
  <circle cx="170" cy="72" r="32" fill="none" stroke="#433124" stroke-width="25"/>
  <!-- Inner coconut meat -->
  <circle cx="170" cy="72" r="18" class="coconut-inner"/>
  <path d="M 160 58 A 18 18 0 0 0 160 86 A 25 25 0 0 1 160 58" class="coconut-shadow"/>
  
  <!-- Second C -->
  <path d="M 270 100 C 240 120, 190 110, 190 70 C 190 30, 240 20, 270 40" fill="none" stroke="#433124" stroke-width="25" stroke-linecap="round"/>
  
  <!-- Second O (Coconut) -->
  <circle cx="320" cy="72" r="32" fill="none" stroke="#433124" stroke-width="25"/>
  <!-- Inner coconut meat -->
  <circle cx="320" cy="72" r="18" class="coconut-inner"/>
  <path d="M 310 58 A 18 18 0 0 0 310 86 A 25 25 0 0 1 310 58" class="coconut-shadow"/>
  
  <!-- Letter S -->
  <path d="M 430 40 C 400 20, 370 40, 390 65 C 410 90, 430 80, 430 105 C 430 130, 380 125, 370 105" fill="none" stroke="#433124" stroke-width="25" stroke-linecap="round"/>

</svg>
